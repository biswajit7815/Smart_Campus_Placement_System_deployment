version: '3.8'

services:

  # ----------------- MongoDB -----------------
  mongo:
    image: mongo:6.0
    container_name: scps_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - scps_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------- server -----------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scps_backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    expose:
      - "5000"
    depends_on:
      - mongo
    networks:
      - scps_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------- client -----------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: scps_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - scps_network

  # ----------------- Admin -----------------
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: scps_admin
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - scps_network

  nginx:
    image: nginx:latest
    container_name: scps_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
      - admin
    networks:
      - scps_network

# ----------------- Volumes -----------------
volumes:
  mongo_data:
    name: scps_mongo_data

# ----------------- Networks -----------------
networks:
  scps_network:
    driver: bridge
